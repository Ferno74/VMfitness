<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to your VM Fitness Gym account." />
  <title>VM Fitness Gym | Login</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body style="background: var(--bg-primary);">

  <!-- Loading Screen -->
  <div class="preloader" id="preloader">
    <div class="loader"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">
        <span class="logo-badge">VM</span>
        <span>VM Fitness</span>
      </a>
      
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About Gym</a>
        <a href="services.html">Services</a>
        <a href="trainers.html">Trainers</a>
        <a href="plans.html">Membership</a>
        <a href="planner.html">AI Planner</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="nav-actions">
        <a href="login.html" class="btn btn-outline btn-ripple">Login</a>
        <a href="signup.html" class="btn btn-primary btn-ripple">Join Now</a>
        <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">☰</button>
      </div>
    </div>
  </header>

  <!-- Login Form Section -->
  <main class="auth-container">
    <div class="form-card reveal">
      <div style="text-align: center; margin-bottom: 24px;">
        <span class="logo-badge" style="display: inline-block; font-size: 18px; padding: 6px 12px; margin-bottom: 12px;">VM</span>
        <h2>Welcome Back</h2>
        <p class="muted">Access your personalized dashboard and fitness goals</p>
      </div>

      <form id="loginForm">
        <!-- Email -->
        <div class="form-group">
          <label for="logEmail">Email Address</label>
          <input type="email" id="logEmail" class="form-control" placeholder="rahul@example.com" required />
          <div id="logEmailError" class="error-message">Please enter a valid email.</div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="logPassword">Password</label>
          <input type="password" id="logPassword" class="form-control" placeholder="••••••••" required />
          <div id="logPasswordError" class="error-message">Password cannot be blank.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-ripple" style="width: 100%; margin-top: 10px; padding: 14px 0;">Login</button>
      </form>

      <div class="form-footer">
        Don't have an account? <a href="signup.html">Register here</a>
      </div>
    </div>
  </main>

  <!-- JS -->
  <script src="js/main.js" defer></script>
  <script src="js/login.js" defer></script>
</body>
</html>
